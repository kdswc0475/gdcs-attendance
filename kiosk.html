<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1565c0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>경로식당 출석체크</title>
  <link rel="manifest" href="manifest-kiosk.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: #1565c0;
      color: #fff;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      /* JS가 --real-vh 를 주입 → iOS 12 Safari 100vh 버그 완전 우회 */
      height: calc(var(--real-vh, 1vh) * 100);
      padding: 10px 14px 10px;
      gap: 8px;
    }

    /* ── 헤더 ── */
    .hd {
      flex: 0 0 auto;
      background: #fff200;
      border-radius: 10px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hd-title { font-size: 15px; font-weight: 900; color: #1a1a1a; line-height: 1.3; }
    .hd-time  { font-size: 20px; font-weight: 900; color: #1a1a1a; font-variant-numeric: tabular-nums; white-space: nowrap; }

    /* ── 안내문 ── */
    .guide {
      flex: 0 0 auto;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    /* ── 입력 디스플레이 ── */
    .display {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      padding: 0 16px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .display-number {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 8px;
      color: #1565c0;
      font-variant-numeric: tabular-nums;
    }
    .display-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .display-name.found    { color: #1b7c3a; }
    .display-name.notfound { color: #c62828; }

    /* ── 키패드 ── */
    .keypad {
      flex: 1 1 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      min-height: 0;
    }
    .key {
      background: #1976d2;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 14px;
      font-family: inherit;
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.08s, transform 0.08s;
      -webkit-user-select: none;
    }
    .key:active {
      background: #fff200;
      color: #000;
      transform: scale(0.93);
    }
    .key.key-clear {
      font-size: 24px;
      font-weight: 900;
      color: #ffcdd2;
      border-color: rgba(255,205,210,0.5);
    }
    .key.key-del {
      font-size: 36px;
      color: rgba(255,255,255,0.7);
    }

    /* ── 출석 체크 버튼 ── */
    .submit-btn {
      flex: 0 0 auto;
      width: 100%;
      height: calc(var(--real-vh, 1vh) * 8);
      background: #fff200;
      color: #000;
      font-family: inherit;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 6px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s, opacity 0.2s;
    }
    .submit-btn:active    { background: #e6d800; transform: scale(0.98); }
    .submit-btn:disabled  { opacity: 0.4; cursor: not-allowed; }

    /* ── 하단 상태 바 ── */
    .status-bar {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      padding: 0 4px;
    }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .dot.on  { background: #4caf50; animation: blink 2s infinite; }
    .dot.off { background: #f44336; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .voice-indicator { font-size: 11px; color: rgba(255,255,255,0.5); }
    .voice-indicator.active { color: #4caf50; }

    /* ── 결과 오버레이 ── */
    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .overlay-bg   { position: absolute; inset: 0; }
    .overlay.ok  .overlay-bg { background: rgba(27,124,58,0.93); }
    .overlay.err .overlay-bg { background: rgba(198,40,40,0.93); }
    .ov-icon { font-size: 72px; position: relative; z-index: 1; }
    .ov-msg  { font-size: 26px; font-weight: 900; color: #fff; position: relative; z-index: 1; text-align: center; line-height: 1.4; white-space: pre-line; }
    .ov-sub  { font-size: 16px; color: rgba(255,255,255,0.85); position: relative; z-index: 1; text-align: center; }

    /* ── 로딩 ── */
    .submit-btn.loading { opacity: 0.7; cursor: not-allowed; }
    .submit-btn.loading::after { content: ' ⏳'; }

    /* ── 홈화면 추가 안내 배너 ── */
    .install-banner {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.88);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      padding: 14px 20px 28px;
      z-index: 1000;
      line-height: 2;
    }
    .install-banner button {
      display: inline-block;
      margin-top: 8px;
      background: #fff200;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 28px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- 헤더 -->
  <div class="hd">
    <div class="hd-title">강동종합사회복지관 경로식당<br><span style="font-size:12px;font-weight:700">출석체크 시스템</span></div>
    <div class="hd-time" id="hd-clock">00:00</div>
  </div>

  <!-- 안내 문구 -->
  <div class="guide">010을 제외한 휴대 전화 번호를 입력하세요</div>

  <!-- 입력 디스플레이 -->
  <div class="display">
    <div class="display-number" id="disp-num">________</div>
    <div class="display-name"   id="disp-name"></div>
  </div>

  <!-- 키패드 -->
  <div class="keypad">
    <button class="key" data-k="1">1</button>
    <button class="key" data-k="2">2</button>
    <button class="key" data-k="3">3</button>
    <button class="key" data-k="4">4</button>
    <button class="key" data-k="5">5</button>
    <button class="key" data-k="6">6</button>
    <button class="key" data-k="7">7</button>
    <button class="key" data-k="8">8</button>
    <button class="key" data-k="9">9</button>
    <button class="key key-clear" data-k="clear">지우기</button>
    <button class="key" data-k="0">0</button>
    <button class="key key-del"   data-k="del">←</button>
  </div>

  <!-- 출석 체크 버튼 -->
  <button class="submit-btn" id="submit-btn" disabled>출 석 체 크</button>

  <!-- 상태 바 -->
  <div class="status-bar">
    <span><span class="dot on" id="net-dot"></span><span id="net-lbl">온라인</span></span>
    <span id="today-cnt">오늘 출석: 0명</span>
    <span class="voice-indicator" id="voice-lbl">🔇 음성 없음</span>
  </div>

</div>

<!-- 결과 오버레이 -->
<div class="overlay" id="overlay">
  <div class="overlay-bg"></div>
  <div class="ov-icon" id="ov-icon"></div>
  <div class="ov-msg"  id="ov-msg"></div>
  <div class="ov-sub"  id="ov-sub"></div>
</div>

<!-- 홈화면 추가 안내 (Safari iOS 전용) -->
<div class="install-banner" id="install-banner" style="display:none">
  📲 전체화면으로 사용하려면<br>
  하단 <strong>공유 버튼 (□↑)</strong> →  <strong>"홈 화면에 추가"</strong> 를 탭하세요
  <br>
  <button onclick="dismissBanner()">확인 (다시 보지 않기)</button>
</div>

<script>
// ══════════════════════════════════════════
//  설정
// ══════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4wHR4VpAomKGMizlV2dTZS7X5p8mqIb0DmEViuP147Y51ezbh10eKkYOcyoEO02UL/exec';
localStorage.setItem('scriptUrl', SCRIPT_URL);
const AUTO_CLOSE = 2800;

// ══════════════════════════════════════════
//  상태
// ══════════════════════════════════════════
let input        = '';
let members      = [];
let todayCnt     = 0;
let isSubmitting = false;

// ══════════════════════════════════════════
//  홈화면 추가 안내
// ══════════════════════════════════════════
function checkInstallBanner() {
  // 이미 홈화면 앱(standalone)으로 실행 중이면 숨김
  const isStandalone =
    window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches ||
    window.matchMedia('(display-mode: fullscreen)').matches;
  if (isStandalone) return;
  if (localStorage.getItem('banner_dismissed')) return;

  const isSafari = /Safari/.test(navigator.userAgent) && !/CriOS|Chrome/.test(navigator.userAgent);
  const isIOS    = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isSafari && isIOS) {
    document.getElementById('install-banner').style.display = 'block';
  }
}
function dismissBanner() {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('banner_dismissed', '1');
}

// ══════════════════════════════════════════
//  음성(TTS)
// ══════════════════════════════════════════
let ttsReady = false;
let ttsVoice = null;

function initTTS() {
  if (!('speechSynthesis' in window)) {
    document.getElementById('voice-lbl').textContent = '🔇 음성 미지원';
    return;
  }
  function loadVoices() {
    const voices = window.speechSynthesis.getVoices();
    ttsVoice = voices.find(v => v.lang === 'ko-KR') ||
               voices.find(v => v.lang.startsWith('ko')) || null;
    if (voices.length > 0) {
      ttsReady = true;
      const el = document.getElementById('voice-lbl');
      el.textContent = '🔊 음성 ON';
      el.classList.add('active');
    }
  }
  loadVoices();
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
}

function speak(text) {
  if (!ttsReady || !('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    const utt    = new SpeechSynthesisUtterance(text);
    utt.lang     = 'ko-KR';
    utt.rate     = 0.95;
    utt.pitch    = 1.0;
    utt.volume   = 1.0;
    if (ttsVoice) utt.voice = ttsVoice;
    window.speechSynthesis.speak(utt);
  } catch(e) {}
}

// ══════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════
async function init() {
  setRealVh();   // ← iOS 12 Safari vh 버그 수정
  initTTS();
  startClock();
  bindKeys();
  document.getElementById('submit-btn').addEventListener('click', submitAttendance);
  window.addEventListener('online',  updateNet);
  window.addEventListener('offline', updateNet);
  updateNet();
  await loadMembers();
  countToday();
  checkInstallBanner();
}

// ── iOS 12 Safari 100vh 버그 수정 ──────────
// window.innerHeight = 주소창 제외한 실제 높이
function setRealVh() {
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--real-vh', vh + 'px');
}
// 화면 회전·리사이즈 시 재계산
window.addEventListener('resize', setRealVh);
window.addEventListener('orientationchange', function() {
  setTimeout(setRealVh, 200);  // 회전 애니메이션 후 재계산
});

function startClock() {
  const tick = () => {
    document.getElementById('hd-clock').textContent =
      new Date().toTimeString().slice(0, 5);
  };
  tick();
  setInterval(tick, 1000);
}

function updateNet() {
  const on = navigator.onLine;
  document.getElementById('net-dot').className = 'dot ' + (on ? 'on' : 'off');
  document.getElementById('net-lbl').textContent = on ? '온라인' : '오프라인';
}

function bindKeys() {
  document.querySelectorAll('.key').forEach(btn => {
    btn.addEventListener('click', () => keyPress(btn.dataset.k));
  });
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') keyPress(e.key);
    else if (e.key === 'Backspace')    keyPress('del');
    else if (e.key === 'Escape')       keyPress('clear');
    else if (e.key === 'Enter')        submitAttendance();
  });
}

async function loadMembers() {
  const cached = localStorage.getItem('members_cache');
  if (cached) members = JSON.parse(cached);
  if (!SCRIPT_URL) return;
  try {
    const res  = await fetch(SCRIPT_URL + '?action=getMembers');
    const data = await res.json();
    if (data.members && data.members.length) {
      members = data.members;
      localStorage.setItem('members_cache', JSON.stringify(members));
    }
  } catch {}
}

function countToday() {
  const today = dateStr(new Date());
  const recs  = JSON.parse(localStorage.getItem('kiosk_records') || '[]');
  todayCnt    = recs.filter(r => r.date === today).length;
  document.getElementById('today-cnt').textContent = '오늘 출석: ' + todayCnt + '명';
}

// ══════════════════════════════════════════
//  키패드
// ══════════════════════════════════════════
function keyPress(k) {
  if (isSubmitting) return;
  if (k === 'clear')    { input = ''; }
  else if (k === 'del') { input = input.slice(0, -1); }
  else                  { if (input.length >= 8) return; input += k; }
  updateDisplay();
}

function updateDisplay() {
  const numEl  = document.getElementById('disp-num');
  const nameEl = document.getElementById('disp-name');
  const btn    = document.getElementById('submit-btn');

  numEl.textContent  = (input + '________').slice(0, 8);
  nameEl.textContent = '';
  nameEl.className   = 'display-name';

  if (input.length === 8) {
    const m = members.find(m => m.phone === input);
    if (m) {
      nameEl.textContent = '✓ ' + m.name + ' 어르신';
      nameEl.className   = 'display-name found';
    } else {
      nameEl.textContent = '⚠ 미등록 번호';
      nameEl.className   = 'display-name notfound';
    }
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}

// ══════════════════════════════════════════
//  출석 등록
// ══════════════════════════════════════════
async function submitAttendance() {
  if (input.length !== 8 || isSubmitting) return;

  isSubmitting = true;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  const now    = new Date();
  const today  = dateStr(now);
  const time   = now.toTimeString().slice(0, 5);
  const member = members.find(m => m.phone === input);
  const phone  = input;

  // ── STEP 0: 미등록자 차단
  if (!member) {
    speak('미등록자입니다. 출석 처리가 되지 않습니다.');
    showOverlay('err', '⛔ 미등록자', '등록되지 않은 전화번호입니다.\n담당자에게 문의하세요.');
    resetInput();
    return;
  }

  // ── STEP 1: 로컬 중복 체크
  const localRecs = JSON.parse(localStorage.getItem('kiosk_records') || '[]');
  const localDup  = localRecs.find(r => r.phone === phone && r.date === today);
  if (localDup) {
    speak(member.name + ' 어르신, 오늘 이미 출석 체크 되셨습니다.');
    showOverlay('err', member.name + ' 어르신', '오늘 이미 출석 체크 되었습니다\n(' + localDup.time + ')');
    resetInput();
    return;
  }

  // ── STEP 2: 서버 중복 체크
  if (SCRIPT_URL && navigator.onLine) {
    try {
      const params = new URLSearchParams({ action: 'getRecords', date: today });
      const res    = await fetch(SCRIPT_URL + '?' + params.toString());
      const data   = await res.json();
      if (data.records) {
        syncLocalFromServer(data.records, today);
        if (data.records.some(r => r.phone === phone)) {
          speak(member.name + ' 어르신, 오늘 이미 출석 체크 되셨습니다.');
          showOverlay('err', member.name + ' 어르신', '오늘 이미 출석 체크 되었습니다\n(서버 기록)');
          resetInput();
          return;
        }
      }
    } catch {}
  }

  // ── STEP 3: 정상 출석 등록
  const record = {
    id: Date.now(), phone,
    name: member.name, date: today, time,
    registered: true,
  };
  localRecs.push(record);
  localStorage.setItem('kiosk_records', JSON.stringify(localRecs));
  todayCnt++;
  document.getElementById('today-cnt').textContent = '오늘 출석: ' + todayCnt + '명';

  speak(member.name + ' 어르신, 출석 체크 완료되었습니다.');
  showOverlay('ok', member.name + ' 어르신', '출석 체크 완료!  ' + time);
  sendToSheets(record);
  resetInput();
}

function resetInput() {
  input = '';
  updateDisplay();
  isSubmitting = false;
  document.getElementById('submit-btn').classList.remove('loading');
}

function syncLocalFromServer(serverRecords, today) {
  const local = JSON.parse(localStorage.getItem('kiosk_records') || '[]');
  let changed = false;
  serverRecords.forEach(sr => {
    if (sr.date === today && !local.find(lr => lr.phone === sr.phone && lr.date === today)) {
      local.push({ id: sr.id||Date.now(), phone: sr.phone, name: sr.name,
                   date: sr.date, time: sr.time, registered: sr.registered });
      changed = true;
    }
  });
  if (changed) localStorage.setItem('kiosk_records', JSON.stringify(local));
  todayCnt = local.filter(r => r.date === today).length;
  document.getElementById('today-cnt').textContent = '오늘 출석: ' + todayCnt + '명';
}

// ══════════════════════════════════════════
//  결과 오버레이
// ══════════════════════════════════════════
let _ovTimer = null;
function showOverlay(type, msg, sub) {
  const ov = document.getElementById('overlay');
  ov.className = 'overlay ' + type + ' show';
  document.getElementById('ov-icon').textContent = type === 'ok' ? '✅' : '⛔';
  document.getElementById('ov-msg').textContent  = msg;
  document.getElementById('ov-sub').textContent  = sub;
  ov.onclick = () => { ov.classList.remove('show'); clearTimeout(_ovTimer); };
  if (_ovTimer) clearTimeout(_ovTimer);
  _ovTimer = setTimeout(() => ov.classList.remove('show'), AUTO_CLOSE);
}

// ══════════════════════════════════════════
//  Google Sheets 전송 (JSONP)
// ══════════════════════════════════════════
function sendToSheets(record) {
  if (!SCRIPT_URL) return;
  const cbName = '_cb_' + Date.now();
  const params = new URLSearchParams({
    action: 'addRecord', id: record.id, phone: record.phone,
    name: record.name, date: record.date, time: record.time,
    registered: 'true', callback: cbName,
  });
  const script = document.createElement('script');
  const timer  = setTimeout(() => { cleanup(); enqueueOffline(record); }, 8000);
  window[cbName] = () => { cleanup(); };
  function cleanup() {
    clearTimeout(timer); delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }
  script.src    = SCRIPT_URL + '?' + params.toString();
  script.onerror = () => { cleanup(); enqueueOffline(record); };
  document.head.appendChild(script);
}

function enqueueOffline(record) {
  const q = JSON.parse(localStorage.getItem('offline_queue') || '[]');
  if (!q.find(r => r.phone === record.phone && r.date === record.date)) {
    q.push(record);
    localStorage.setItem('offline_queue', JSON.stringify(q));
  }
}

window.addEventListener('online', async () => {
  updateNet();
  const q = JSON.parse(localStorage.getItem('offline_queue') || '[]');
  if (!q.length) return;
  for (const r of q) sendToSheets(r);
  localStorage.removeItem('offline_queue');
});

function dateStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
