<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>경로식당 출석체크</title>
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
    }

    html {
      /* Retina 2x → CSS 픽셀 768px 높이 */
      height: 100%;
    }

    body {
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1976d2;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      /* JS가 window.innerHeight 를 여기에 직접 px 세팅 */
    }

    /* ── 헤더: 고정 50px ── */
    .header {
      height: 50px;
      flex-shrink: 0;
      background: #ffe000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 14px;
    }
    .header h1 { font-size: 17px; font-weight: 900; color: #000; }
    .header p  { font-size: 11px; color: #444; }
    .clock     { font-size: 28px; font-weight: 900; color: #000; }

    /* ── 안내문: 고정 32px ── */
    .guide {
      height: 32px;
      flex-shrink: 0;
      background: #1565c0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
    }

    /* ── 번호 디스플레이: 고정 64px ── */
    .display {
      height: 64px;
      flex-shrink: 0;
      background: #fff;
      margin: 6px 8px 4px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .disp-num {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: #1565c0;
      line-height: 1;
    }
    .disp-name {
      font-size: 14px;
      font-weight: 700;
      min-height: 18px;
      margin-top: 2px;
    }
    .found    { color: #2e7d32; }
    .notfound { color: #c62828; }

    /* ── 키패드 래퍼: 나머지 전부 ── */
    .keypad-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 4px 8px 4px;
      gap: 4px;
    }

    /* ── 4행 3열 그리드 ── */
    .keypad {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 4px;
    }

    .key {
      background: #1976d2;
      border: 2.5px solid rgba(255,255,255,0.45);
      border-radius: 12px;
      color: #fff;
      font-weight: 900;
      /*
        vmin 기준: iPad 세로모드에서 vmin = 가로 768px 기준
        8vmin = 약 61px — 버튼이 120px 높이면 절반 크기로 적절
      */
      font-size: 8vmin;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: background 0.07s, transform 0.07s;
      width: 100%;
      height: 100%;
    }

    .key.pressed, .key:active {
      background: #fff200;
      color: #000;
      transform: scale(0.93);
    }

    .key-clear { font-size: 4vmin; color: #ffe082; }
    .key-del   { font-size: 6vmin; }

    /* ── 출석체크 버튼: 고정 60px ── */
    .submit-btn {
      flex-shrink: 0;
      height: 60px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #66bb6a, #388e3c);
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.25em;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity 0.15s, transform 0.08s;
    }
    .submit-btn:disabled {
      background: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.45);
    }
    .submit-btn:not(:disabled):active { transform: scale(0.97); }

    /* ── 상태바: 고정 20px ── */
    .statusbar {
      height: 20px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.28);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>강동종합사회복지관 경로식당</h1>
    <p>출석체크 시스템</p>
  </div>
  <div class="clock" id="clock">--:--</div>
</div>

<div class="guide">010을 제외한 휴대 전화 번호를 입력하세요</div>

<div class="display">
  <div class="disp-num"  id="disp-num">— — — — — — — —</div>
  <div class="disp-name" id="disp-name"></div>
</div>

<div class="keypad-wrap">
  <div class="keypad">
    <button class="key" data-k="1">1</button>
    <button class="key" data-k="2">2</button>
    <button class="key" data-k="3">3</button>
    <button class="key" data-k="4">4</button>
    <button class="key" data-k="5">5</button>
    <button class="key" data-k="6">6</button>
    <button class="key" data-k="7">7</button>
    <button class="key" data-k="8">8</button>
    <button class="key" data-k="9">9</button>
    <button class="key key-clear" data-k="clear">지우기</button>
    <button class="key" data-k="0">0</button>
    <button class="key key-del"   data-k="del">←</button>
  </div>
  <button class="submit-btn" id="submit-btn" disabled>출 석 체 크</button>
</div>

<div class="statusbar">
  <span>● 온라인</span>
  <span id="stat-count">오늘 출석: 0명</span>
  <span id="stat-sync">동기화 --:--</span>
</div>

<script>
  /*
    핵심: window.innerHeight = Safari 주소창+탭바 제외한 실제 높이
    iPad Air 1세대 세로모드 Safari 기준 약 620~660px
    이 값을 body에 직접 px로 고정
  */
  function fixHeight() {
    document.body.style.height = window.innerHeight + 'px';
  }
  fixHeight();
  window.addEventListener('resize', fixHeight);
  window.addEventListener('orientationchange', () => setTimeout(fixHeight, 400));

  /* 디버그: 실제 높이 확인용 (나중에 삭제 가능) */
  console.log('innerHeight:', window.innerHeight, 'innerWidth:', window.innerWidth);

  /* 시계 */
  function updateClock() {
    const n = new Date();
    const t = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = t;
    document.getElementById('stat-sync').textContent = '동기화 ' + t;
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* 회원 명단 - localStorage에서 로드 */
  function getMembers() {
    try {
      const cached = localStorage.getItem('members_cache');
      if (cached) return JSON.parse(cached);
      const adminMembers = localStorage.getItem('gdcs_members');
      if (adminMembers) return JSON.parse(adminMembers);
    } catch (e) {
      console.error('회원 명단 로드 실패:', e);
    }
    return [];
  }

  let members = getMembers();
  let input = '';

  // 회원 명단 주기적으로 갱신 (관리자에서 추가/삭제 반영)
  setInterval(() => {
    members = getMembers();
  }, 5000);

  function keyPress(k) {
    if      (k === 'clear') input = '';
    else if (k === 'del')   input = input.slice(0, -1);
    else if (input.length < 8) input += k;
    updateDisplay();
  }

  function updateDisplay() {
    const numEl  = document.getElementById('disp-num');
    const nameEl = document.getElementById('disp-name');
    const btn    = document.getElementById('submit-btn');
    const chars  = input.split('').concat(Array(8 - input.length).fill('—'));
    numEl.textContent = chars.join(' ');
    if (input.length === 8) {
      const m = members.find(x => x.phone === input);
      nameEl.textContent = m ? '✓ ' + m.name + ' 어르신' : '⚠ 미등록 번호입니다';
      nameEl.className   = 'disp-name ' + (m ? 'found' : 'notfound');
      btn.disabled = false;
    } else {
      nameEl.textContent = '';
      nameEl.className   = 'disp-name';
      btn.disabled = true;
    }
  }

  document.querySelectorAll('.key').forEach(btn => {
    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      keyPress(btn.dataset.k);
      btn.classList.add('pressed');
    }, { passive: false });
    btn.addEventListener('touchend', () => btn.classList.remove('pressed'));
    btn.addEventListener('mousedown', () => keyPress(btn.dataset.k));
  });

  document.getElementById('submit-btn').addEventListener('click', () => {
    if (document.getElementById('submit-btn').disabled) return;
    alert('출석이 완료되었습니다!');
    input = '';
    updateDisplay();
  });
</script>
</body>
</html>
